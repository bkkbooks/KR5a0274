body:
  text: 黃庭內景玉經註梁丘子註上睹章第十六上睹三元如連珠三元爲三光之元日月星非指上中下之三元辰也落落明景照九隅三光在上而下燭九隅九方也言常存日月洞照一身也五靈夜燭焕八區五靈謂五星也燭焕羅列一身常能存之則與天地同休子存内皇與我遊大道無心有感即應身披鳳衣銜虎符仙宫之服御也一至不乆昇虚無一者無二之稱也學道傳一與靈同體則神仙可到也南華眞經曰人能守一萬事致畢矣方寸之中念深藏方寸之中爲下關關在臍下三寸方圓一寸以藏精不方不圓閉牖窗方靜圓動不動不靜但當杜塞不妄泄也三神還精老方壯還精神於三田則乆壽延年矣魂魄内守不爭競魂陽魄陰各得其一易曰一陰一陽之謂道神生腹中銜玉璫内守不洩神生銜璫腹中内明口吐珠玉按五神行事訣云兩眉間直入上三寸爲玉璫紫關靈注幽闕那得喪腹中神生靈氣流通故不亡也固精闕於腎腎主水色黑氣通於耳雙立闕者象於峻極也琳條萬尋可廕仗身隨衆靈森然交映如萬尋玉樹可廕庇也外象喻也琳條玉樹條也萬尋高遠也象身形洞眞神明所庇廕三魂自寧帝書命修身神安帝書下召眞道既成名書帝録則乆視之也靈臺章第十七靈臺鬱靄望黄野心曰靈臺脾爲黄野常專一存見黄庭也三寸異室有上下三丹田上中下三處各異每室方圓一寸也故云三寸今人猶謂心爲方寸即其所也間關榮衛高玄受三田之間各有間關榮衛部分至高至低心當受以存念也洞房紫極靈門户大洞經云兩眉間入三分爲雙丹田入骨際三分爲臺關正深七分左有心房右有紫户却入一寸爲明堂宫左有明童眞君右有明女眞君却入二寸爲洞房左有無英君右有白元君中有黄老君却入三寸爲丹田宫亦名泥丸宫有上元赤子居之右有帝卿君却入四寸爲流珠宫有流珠眞神居之却入五寸爲玉帝宫有玉清眞母居之又當明堂上一寸爲天庭宫有上清眞女居之洞房上一寸爲極眞宫有太極帝妃居之丹田上一寸爲玄丹宫有中皇太一眞君居之流珠上一寸爲太皇宫有太上眞君居之故曰靈門户也是昔太上告我者我者榑桑大帝自謂也言我道成承昔道君授以黄庭之時也言此道不遠止在丹田故即言是昔也左神公子發神語据大洞經云左有無英此云公子亦互言耳發神語者用心專一則神教之以道也右有白元併立處左右爲學道者之持明堂金匱玉房間皆上元之宫釋如上說也上清眞人當吾前上元部神悉在天庭之際也黄裳子丹氣頻煩謂中元童子處於赤城頻煩氣盛不衰竭也借問何在兩眉端明堂之所内挾日月列宿陳五辰行事訣云太上眞人招五辰洞房南極元君傳授每夜半坐卧心存西方太白星在兩眉間上直入於一寸玉璫金闕左日右月又次存北方辰星在帝鄉玄宫玄宫在髮際五分直入一寸也又次存東方歲星在洞闕朱臺朱臺在目後直入一寸是也又次存南方熒惑星在玉門華房在目眥際五分直入五分是也又次存中央鎮星在金室長谷在人中直入二分是也並存之如綴懸於上畢叩齒三通咽液五過微呪曰高元紫闕中有五神寳耀發輝放光衝門精氣頓生化爲老人首巾素容緑帔絳裙右帶流鈴左佩虎符手把天罡散輝飛辰足躡華蓋吐芒鍊身三景保守令我得眞養魂制魄乗飈飛仙其事内象法也七曜九元冠生門七曜七星即人之七竅九元九辰即人之九竅廢一不可故曰冠生門也三關章第十八三關之中精氣深謂關元之中男子藏精之所也又據下文口手足爲三關又元陽子以明堂洞房丹田爲三關並皆可以文義取之而存也九微之内幽且陰大洞經云三元隱化則成三官是名太清太素太和三三如九故有三丹田又有三洞房合上三元爲九宫宫有精微故曰九微言幽玄而不可見也口爲天關精神機言發於情猶樞機也手爲人關把盛衰縱擒由己足爲地關生命扉言運用己身而生也若得章第十九若得三宫存玄丹三丹田宫故曰三宫玄丹丹元也存思在心故偏指一所也太一流珠安崑崙太一流珠謂目睛洞神經曰頭爲三台君爲崑崙指上丹田也又云臍爲太一君亦爲崑崙指上丹田也言心存三丹田神皎然在於目前本經云子欲不死修崑崙是也重重樓閣十二環謂喉嚨十二環相重重在心上心爲絳宫有象樓閣故也自高自下皆眞人高下三田十二樓閣皆有眞人釋如上說玉堂絳字盡玄宫絳宫明堂上下相應皆宫室也璇璣玉衡色蘭玕喉骨環圓轉動之象蘭玕其色也瞻望童子坐盤桓存見赤城童子子丹眞人坐言其神安靜也問誰家子在我身言己有之此人何去入泥丸與上元諸神上下相應經云腦爲泥丸官千千百百自相連神本出於一一生二二生三三生萬物變化不離其身心也一一十十似重山存見萬物重疊安坐山象坐之形也雲儀玉華俠耳門雲儀玉華鬢髮之號言耳居其間大洞經曰髮神名蒼華凡言華者猶草木之華者也赤帝黄老與我魂赤帝南方帝君也黄老君中央君也魂爲陽神魄爲陰神陰陽相應故言與魂太微靈書云人有三魂一曰胎光二曰爽靈三曰幽精常呼念其名則三魂常不離其身三眞扶胥共房津魂與赤帝黄老爲三眞言相應扶胥同津共氣五斗焕明是七元五斗五星北斗洞房訣云存七元辰者或眠起初卧食畢後呪曰五星開通六合紫房迴元隱道豁落七辰生魂者玄父變一成神生魄者玄母化二成身攝吾筋骨者公子爲吾精氣者白元長生乆視飛仙十天日月飛行六合間天地内爲六合存念身中日月星辰森羅萬象如一天之間了然也帝鄉天中地户端眉上髮際五分直入一寸爲帝鄉又明堂上一寸爲天庭即天中又鼻爲上部之地户心存日月星辰等諸神常在其端謂鼻之上髮際之下也面部魂神皆相存内外心神目相應也呼吸章第二十呼吸元氣以求仙採飛根玄暉吞五芽挹九霞服食胎息之道謂天地陰陽四時五行之氣仙公公子似在前此洞房訣也洞房宫左爲無英一名公子仙公直指黄庭學者黄庭仙公能行洞房之訣而存其公子故言在前也朱鳥吐縮白石源朱鳥舌象白石齒象吐縮導津液調陰陽之氣流行不絶故曰源也結精育胞化生身本己之所以從來也留胎止精可長生眞誥曰上清眞人口訣夫學道之人安心養神服食治病使腦宫填滿玄精不傾然後可以存形神服霞呼吸二景若數行交接漏洩施者則氣穢神亡精靈枯竭雖佩玄挺玉籙金書太極者將何解於能生乎昔在先師常心戒斯事云學生之人一接則傾一年之藥勢二接則傾二年之藥勢已往則不傾之藥都亡於身是以眞仙常慎於此蓋以爲生生之大忌於此者也三氣右迴九道明三氣爲三丹田之氣也右迴言周流順緒謂和陰陽則四關九竅通流明朗而無疾也正一合華乃充盈含正守一神氣華榮故能充滿六合乗物而能變之也遥望一心如羅星存見赤城子居在城中如星之映羅縠也金室之下不可傾謂心居肺下主金其色白故金室常能存之長生不死延我白首返孩嬰内指事謂童顔不死瓊室章第二十一瓊室之中入素集謂上元清眞瓊室體骨之象也泥丸夫人當中立經云洞房中有父母母則夫人亦名道母泥丸洞房上已解釋長谷玄鄉繞郊邑長谷鼻也玄鄉腎也郊邑爲五藏六府也言鼻中氣出入下爲腎運周繞藏府居赤城存想内郭外郊故爲象喻也六龍散飛難分别言六府之氣微妙玄通難分别而想存之長生至慎房中急氣亡液漏髓枯精竭益以涓滴而洩以尾閭不可不慎也何爲死作令神泣房中不慎傷精失明故神泣也忽之禍鄉三靈没禍鄉死地也三靈三魂也謂胎光爽靈幽精亡没但當吸氣録子精呼吸吐納閉房止精寸田尺宅可治生謂三丹田之宅各方一寸故曰寸田依存丹田之法以理生也經云寸田尺宅彼尺宅謂是面也若當决海百瀆飲謂房中淫洩不知閉止葉去樹枯失青青象人死無生氣氣之液漏非己形仙經云閉房鍊液不遠唾不多言是也專閉御景乃長寧專閉情慾存日月光老子云善閉無關鍵而不可開又上清素文靈書有採氣根之法當以日初出東向叩齒九通陰呪曰日魂珠景照韜緑映回霞赤童玄炎飈象呼此十六字畢瞑目握固存五色流霞來接一身於是日光流霞俱入口中名曰飛華玉胞水母也尚日吞霞四十五咽又咽液九過保我泥丸三奇靈泥丸上丹田也大洞經云三光隱化則成三官一曰太清之中三君也二曰三丹田神三曰符籍之神故曰三奇靈也恬淡閙視内自明謂存思丹田之法並如上說物物不干泰而平行道眞正邪物不干慤矣匪事老復丁猛獸不據玃鳥不摶老者返壯少者皆强慤矣必然思詠玉書入上清精研内景必獲仙道常念章第二十二常念三房相通達三房謂明堂洞房丹田之房也與流珠五帝天庭極眞玄丹泥丸太皇等諸宫左右上下皆相通也洞視得見無内外有想三三如九合九爲一明徹天上無有内外存漱五芽不飢渴靈寳有服御五芽之法五芽者五行之生氣以配五藏元精經云常以立春之日雞鳴時入室東向九拜平坐叩齒九通想東方安寳華林青靈始老君九千萬人下降室内鬱鬱如雲之覆已形從口中入直下肝府呪曰九氣青天元始上精皇老尊神衣服羽青設御天宫焕明歲星散輝流芳淘溉我形食咽朝霞服飲木精固養青芽保慎於零肝府充溢王芝自生延年潤色顔返孩嬰五氣混合天地長并畢引青氣九咽便服東方赤書玉文十二字也神華執巾六丁謁神華者玉曆經云太陰玄光五女道之母也衣五色朱衣脾藏之上黄雲華蓋之下六丁者謂六丁陰神玉女也老君六甲符圖云六丁各有神丁卯神司馬都玉女足月之丁丑神趙子王玉女順氣丁亥神張文通玉女普漂之丁酉神蔣文公玉女得喜丁未神石叔通玉女寄防據丁巳神崔巨卿玉女聞心之言服採飛根者漱黄芽之道成則役使六丁神故也急守精室勿妄泄精室謂三丹田上下相連而不絶制之在於心心即中丹田也緩急之所由眞妄之根本閉而保之可長活積精之所致也起自形中初不闊謂心使氣微妙無形三宫近在易隱括括謂三丹田中眞宫近在人身隱括精氣當以心爲君主者虚無寂寂空中素外指事也素有二說使形如是不當汙使形輕靜如懸縑素於空中也又身中空素使如器輕素虚靜常然汙謂有外事也九室正虚神明舍九室謂頭中九宫室及人之九竅使上宫榮華九竅眞正則衆神之所止也洞神經云天有九星故稱九天地有九宫故稱九地人有九竅故稱九生言人所由而生之也存思百念視節度存念身中有百神呼吸上下一如科法又云千千百百似重山皆神象也六府修治勿令故按洞神經云六府者謂肺爲玉堂宫爲尚書府心爲絳宫元陽府肝爲清冷宫蘭臺府膽爲紫微宫無極府腎爲出牧宫太和府脾爲中黄宫太素府異於常六府也行自翶翔入雲路謂昇仙形化也治生章第二十三治生之道了不煩無爲清簡約己守正但修洞玄與玉篇洞玄謂洞玄靈寳玉篇眞文乃黄庭也兼行形中八景神玉篇經云五藏有八卦天神宿衛太一使者王八節一爲九宫八卦外有十二樓樓爲喉管也臍中爲太一君主人之命一名太淵一名崑崙一名太極主身中萬三千精光二十四眞出自然天有二十四眞氣人身亦有之又三丹田之所三八二十四眞人皆自然之道氣高拱無爲魂魄安行忘坐忘離形去智清靜神見與我言能清能靜則心神自見機覽無外與己言之即謂黄庭眞人也安在紫房幃幙間紫房幃幙一名絳宫赤城中童子所安之處存思心神其狀如此也立坐室外三五玄謂八景乃二十四眞神榮衛人身則三田五藏眞氣調柔無其災病燒香接手玉華前玉華則華蓋之前也謂眉間天庭也一曰神之宗元眞人之窟宅當從文而存之共入太室璇璣門據洞房眞經云天有太室玉房雲庭雲庭中央黄老君之所居也玉房一名紫房一名絳宫通名黄堂有華蓋東西宫洞通左右黄庭之内人身俱有之如上文說璇璣中樞名也高研恬淡道之圜研精恬淡眞氣來遊内視密盻盡見眞入靜思存百神森然眞人在己莫問鄰玉臺經云老子者天之魂自然之君常侍道君在左右人身俱有之何處遠索求因縁經云大道汎兮其可左右言之不遠隱景章第二十四隱景藏形與世殊學仙之士含光藏輝滅其迹匿其端含氣養精口如朱肌膚若冰雪綽約若處子帶執性命守虚無虚靜恬淡寂寞無爲名入上清死録除得補眞人則象玄名三神之樂由隱居理身無爲則神樂理國無事則人安三神三丹田之神是也倏欻遊遨無遺憂倐欻疾發也下文云駕欻接生妄東蒙或云倏欻龍名無遺憂謂懸解之也羽服一整八風驅八風八方風也先驅掃路也羽服仙服也按上清寳文仙人五色羽衣太乙眞人衣九色雲飛之羽章皆神仙之服故名也控駕三素乗晨霞外指事三雲九霞乃神仙之所金輦正位從玉譽元録經云上清九天玄神八聖驂駕九鳳龍車九天玉轝金輦皆仙人之服器何不登山誦我書書則黄庭言也鬱鬱窈窈眞人墟山中幽邃入山何難故躊躇情志不决人間紛紛臭如帑疾穢人間不足戀帑至臭也五行章第二十五五行相推返歸一五行謂金木水火土相推者金生水水生木木生火火生土土生金周而復始互相尅法火尅金金尅木木尅土土尅水水尅火周而復始相推者道也返歸一一者一水數也五行之道萬物之宗老子云道生一一生二二生三三生萬物及易有太極是生兩儀太極一也兩儀天地天地生萬物萬物又返而歸一一者無之稱也萬物所成故曰返歸一也三五合氣九九節妙眞經云三者在天爲日月星在地爲珠玉金名曰三寳在人身爲耳口鼻名爲三生天地人爲三才而各懷之五者帝精也故云三五合三三爲九也夫三五所懷順衆類也和調萬物治化陰陽覆載天地光明四海風雨雷電春夏秋冬寒暑温凉清濁之氣諸生之物不得三五合不立也故曰天道不遠三五復返三五者天地之帑藏六合之要會九宫之氣節九九八十一爲一章耳可用隱地回八術九宫中有隱遁變化之術太上八氣奔宸隱書是曰八術义太極八藴之術太極中有三君一曰太上皇君二曰天皇君三曰黄老君三元之氣混成之精出入上清太虚之宫隱遁無形故能長生之道也伏牛幽闕羅品列伏牛腎之象也腎爲幽闕中黄經云左腎爲玄妙眞右腎爲玄元君羅列品位存思則見也三明出於生死際天三明日月星地三明文章華人三明耳鼻口是生死之際也洞房靈象斗日月存三元於洞房洞房明堂已釋於上父曰泥丸母雌一明堂中有君臣洞房中有夫婦丹田中有父母泥丸腦神名老子經云知其雄守其雌雌無爲一也三光焕照入子室明白四達能存玄眞萬事畢莊子曰人能守一萬事畢一身精神不可失常存念之不捨須臾修眞十書黄庭內景玉經注卷之五十六
