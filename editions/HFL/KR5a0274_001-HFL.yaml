body:
  text: 黃庭內景玉經註并序梁丘子撰夫萬物以人爲主人以一心爲宗無主則法不生無心則身不立心法多門妙用非一有無二體隨事應機故有凡聖淺深愚智眞假莫匪心辯識運用之所由也但天下之道殊途而同歸百慮而一致從麤入妙權實則有二階總迹符眞是非同乎一見有黄庭經者東華之所祕也誠學仙之要妙羽化之根本矣釗襞習未周而觀想粗得裁靈萬品模擬一形義有四宗會明七字指尋象喻内外兩言絀聽隳體之餘任嘘縱呬之暇䑛筆磨墨輒貽原筮扶桑大帝君命暘谷神王傳授南嶽魏夫人黄庭内景經黄者中央之色庭者四方之中外指事即天中人中地中内指事即腦中心中脾中故曰黄庭也内者心也景者色象也外喻即日月星辰雲霞之色内喻即筋骨藏府之象心居身内存觀一體之象色故曰内景也一名琴心又琴者和也誦之可以和六府寧心神使得仙矣一名大帝金書扶桑大帝君宫中盡誦此經以金簡刻書之故曰金書一名東華玉篇東華者東方諸宫名也東海青童君所居其中玉女仙人皆誦詠之刻玉書之以名玉篇當清齋九十日誦之萬遍使調和三魂制鍊七魄除去三尸安和六府五藏生華還返嬰孩百病不能傷災禍不能害萬遍既畢自然洞觀鬼神内視腸胃得見五藏其時當有黄庭眞人東華玉女教子之神仙焉常誦詠之者則神室明正胎眞安寧靈液流通百關調暢血髓充溢腸胃虚盈五藏結華耳目聰明白髮還黑朽齒再生所以却邪痾之紛若者謂我已得魂精六緯之姓名也清虚玉眞口訣云夫黄庭經者扶桑大帝君金書鍊眞之祕言也讀誦之者當在别室燒香潔淨乃執之也此經所辟百邪若入山林及空闇之地心中震怖者正心向北誦經一遍即神靜意平如與千人同旅能讀之萬遍目見五藏腸胃及天下鬼神役使在己若困病心存讀之垂死亦瘉大都通忌食六畜魚腥五辛及履殗污之事若脱履殗污之者沐浴盥漱燒香於左右讀經一遍百痾除也上清章第一上清紫霞虚皇前三清之境有太清上清玉清此三清之中一切大聖之所居也按玉臺經云虚皇者大道君之所理也即大道之域包羅三清又玄都十號云太靈虚皇天尊也即元始之本號也道君欲明七言之所始乎紫霞之宫故也亦名紫瓊宫赤白紫宸宫也太上大道玉宸君太上之尊也按本行經云有元始五老之君號也玉晨君即黄者君之號也間居蘂珠作七言祕要經云仙宫中有寥陽之殿蘂珠之闕翠雲之房道君在中而說經人身備有之故也散化五形變萬神謂能變化黜聰明離形去智同於大道先本後迹故假神托用神者隨應也散有五形變萬神是爲黄庭曰内篇因中而得名也琴心三曡舞胎仙琴和也叠積也存三丹田使和積如一則胎仙猶胎息之仙猶胎在腹有氣但無息也九氣映明出霄間三田之中有九氣炳焕而無不燭大洞經云三丹田三元及三洞房合爲九宫宫中有天皇九魄變爲九氣化爲九神也神蓋童子生紫煙觀照存思假目爲事下文云眉號華蓋覆明珠神蓋眉也明珠目瞳也紫煙精妙氣也是曰玉書可精研文因迹始專則之通詠之萬遍昇三天精備神充名上三清千災以消百病痊精神俱故也不憚虎狼之凶殘無餘傷也亦以却老年永延唯此一章都說黄庭之道也上有章第二上有魂靈下關元上魂天分也下關地分也魂靈無形關元有質人法天地形象左爲少陽右太陰左東右西卯生酉殺後有密户前生門前南後北密户後二竅言隱密也生門前七竅言藉以生也爲九竅出日入月呼吸存日月者陰陽之精也左出右入身有陰陽之氣法象天地之氣出爲呼氣入爲吸氣呼吸之間心當存之元氣所合列宿分元氣一也使心與道合存日月星辰靈光照耀羅列一身分明與天合紫煙上下三素雲紫煙目精之氣也存見三丹田中上下俱有白氣流通一體又云目光有紫青緑三色爲三素雲仙經云雲林夫人呪曰日月童三雲兩目眞君精故也灌溉五華植靈根素雲之氣在口爲玉液存咽之以灌五華者五藏之英華靈根命根植生之也七液洞流衝盧間七竅之液上下洞流上衝下回盧頷之間明堂之中迴紫抱黄入丹田内象喻也脾氣黄目氣紫七液周流抱黄迴紫出入呼及俱入丹田丹田有三所靈命之根也按大洞經云眉間入三分爲雙丹田入骨際三分爲臺闕左青房右紫户二神居之眉間却入一寸爲明堂左明童君右明女君中明鏡神君眉間却入二寸爲洞房左無英君右白元君中黄老君眉間却入三寸爲丹田亦名泥丸宫左有上元赤子君右有帝卿君又却入四寸爲流珠宫有流珠眞君居之又却入五寸爲玉帝宫玉清眞母居之又當明堂上一寸爲天庭宫上清眞女居之又洞房直上一寸爲極眞宫太極帝君居之又丹田直上一寸爲丹玄宫有中黄太乙君居之又流珠直上二寸爲太皇宫太上君居之男爲雄一女爲雌男女並可修之幽室内明照陽門幽隱之室内自思存心目明鑒了如如日月神者無方之謂也心神無方存之則有遺之則亡口爲章第三口爲玉池太和宫口中液水爲玉津一名醴泉亦名玉漿貯水爲池也百節調柔五藏和適皆以口爲官主也一本作太和宫於文韻不便也大洞經云心存胃口有一女子嬰兒形無衣服正立胃管張口承注魂液仰吸五氣當即藏滿口中内外津液滿口咽之遣直入玄女口中五過畢叩齒三通微呪曰玉清高上九天九靈化爲神女下入胃清金和玉映心閑神明服食日精金華充盈漱咽靈液災不干靈液眞氣邪不忤正體生光華氣香蘭不食五穀體無滓穢却滅百邪玉鍊顏肌膚若冰雪綽約若處子審能修之登廣寒廣寒北方仙宫之名冬至之日月伏廣寒之宫其時育養月魂於廣寒之地天人採精華之綵以辨日月之光晝夜不寐乃成眞勤修靜定則爲眞人雷鳴電激神泯泯調神理氣精魄恬愉雖震雷而不驚懼又曰雷爲電激爲叩齒存思乃是神用不得言泯泯也黄庭章第四黄庭内人服錦衣黄庭内人謂道母黄庭眞人謂道父身備有之錦衣具五色也即謂五藏之眞氣也三庭之中備有之故也紫霞飛裙雲氣羅十方經云高上玉皇衣文明飛雲之裙即神仙之服也丹青緑條翠靈柯五色雜氣共生枝條仙衣之所七莛玉籥閉兩扉外象喻也七竅開合以喻關籥用之以道不妄閉也莛籥之飾也存神必閉目曰閉兩扉重掩金關密樞機金取堅剛也老子經云善閉無關鍵而不可開言養生善守精神不妄泄玄泉幽闕高崔嵬玄泉者口中之液也一曰玉漿一名玉液一名玉泉兩目間爲闕庭兩腎間爲幽闕如門之左右象巍中然爲道腎在其内故曰幽闕也據腎在五藏之下而云高者形伏存神則在丹田之上故曰高也三田之中精氣微内指事也丹田之中神氣變化感應從心非有非無不可爲也象麤入妙必基有條故以氣則用心爲主因立象至靜至微不可以數求之道機經云天有三光日月星人有三寳三丹田丹田中氣左青右黄上白下黑也嬌女窈窕翳霄暉眞誥云矯女耳神名也言耳聽朗徹明掩玄暉重堂焕焕揚八威重堂喉嚨名也一曰重樓亦名重環本經云絳宫重樓十二級絳宫心也喉嚨在心上故曰重堂喉嚨者津液之路也流通上下滋榮一體焕明八方八方之神曰八威也天庭地關列斧釿兩眉間爲天庭紫微夫人呪曰開通天庭使我長生列斧釿言勇壯也靈臺盤固永不衰心爲靈臺言有神靈居之靜則守一動則存神神具體安不衰竭也中池章第五中池内神服赤珠膽爲中池舌爲華池小腹爲玉池亦三池之名膽部章曰龍旂横天擲火鈴赤珠言火鈴也丹錦雲袍帶虎符丹錦雲袍心肺之色也在膽上故曰雲袍虎符也九眞經云黄老君之服玄龍神虎符帶流金之鈴並道君之服也横津三寸靈所居内指事也臍在胞上故曰横津臍下三寸爲丹田眞人赤子所居也隱之翳鬱自相扶謂男女之形體也隱鬱交合自然之道按内外神芝記訣云五藏之液爲芝即隱芝也又名内芝天中章第六天中之嶽精謹修天中之嶽爲鼻也一名天臺消摩經云鼻欲數按其左右令氣平也所謂灌溉中嶽名書帝録也靈宅既清玉帝遊面爲靈宅一名天宅以眉目口之所居故爲宅修之精通則神仙遊矣大洞經云面爲尺宅又或云赤澤通利道路無終休太素丹景經云一面之上常欲兩手摩拭之高下隨其形不息則通利耳目口之氣脉故也眉號華蓋覆明珠明珠目也九幽日月洞虚无五神行事云眉上直入一寸爲玉堂紫闕左日右月又玉歷經云太清上有五色華蓋九重人身亦有當存目童如日月明也宅中有眞常衣丹眞龍心神即赤城童子也亦名眞亦名赤子亦名子丹亦名眞人存見之常在目前與心應而象心氣色也審能見之無疾患元陽子曰常存心神則無病也赤珠靈裙華倩粲心神之服色外喻也舌下玄膺生死岸内指事也玄膺者通津液之岸也本經云玄膺氣管受精符也焉出清入玄二氣焕謂吐納陰陽二氣焕然普明子若遇之昇天漢人能善遇吐納之理即成天仙至道章第七至道不煩决存眞專之則至泥丸百節皆有神神者妙萬物而因象立名髮與蒼華字太元白與黑謂之蒼最居首上故曰太元也腦神精根字泥丸丹田之宫黄庭之舍洞房之主陰陽之根泥丸腦之象也眼神明上字英玄目喻日月在首之上故曰明上英玄童子精色也内指事鼻神玉隴字靈堅隆隴之骨象如玉也神氣通天出入不竭故曰靈堅也耳神空閑字幽田空閑幽靜聽物則審神之所居故曰幽田舌神通命字正倫咽液以舌性命得通正其五味各有倫理齒神崿峰字羅千牙齒堅利如崿刃鋒摧羅衆物而食之一面之神宗泥丸腦神丹田百神之主泥丸九眞皆有房大洞經云三元隱化則成三宫三三如九故曰三丹田又有三洞房合上三元爲九宫中有九眞神三九二十七神氣和人當存之亦謂九皇九魂變九氣以爲九神各居一洞房也方圓一寸處此中房有一寸腦有九瓣同服紫衣飛羅裳九眞之服皆象氣色飛猶輕故也但思一部壽無窮存思九眞不死之道非各别住居腦中丹田之中泉神所居列位次坐向外方神統丹田而外其面以捍不祥八素經云眞有九品向外列位則當上眞上向高眞南向太眞東向神眞西向玄眞北向仙眞東北向天眞東南向虚眞西南向至眞西北向天眞者不視而明不聽而聰不言而正不行而從也所存在心自相當心存玄眞内外相應心神章第八心神丹元字守靈内象喻也心爲藏府之元南方火之色栖神之宅也故曰守靈肺神皓華字虚成肺爲心之華蓋皓白也西方金之色肺色白其質輕虚故曰虚成也肝神龍煙字含明肝位木行東方青龍之色也於藏主目日出東方故曰含明也翳鬱道煙主濁清翳鬱木象得火而煙生得陽而氣清清即目明濁即目暗腎神玄冥字育嬰腎屬水故曰玄冥腎精爲子故曰育嬰脾神常在字魂停脾中央土位也故曰常在即黄庭之宫也脾磨即食消神力象壯故曰魂停也膽神龍曜字威明膽色青光故曰龍曜主於勇悍故曰威明外取東方青龍雷震之象六府五藏神體精資保一身廢一不可故曰神體精心肝脾肺腎爲五藏胃大腸小腸膀胱三焦膽爲六府所言府者猶府邑之府取受物之義故曰府也藏者各具一質而共藏於身故爲藏也言三焦者多矣而未的其眞蓋心肝腑三藏之上而係管之中爲三焦中黄經云心肝肺三焦當指其所也又據五方之色脾爲五藏之主而今其以心爲主何也答曰心居五藏中其質虚受是神識之體運用之源故偏方而得其主動用而獲其神不可以象數言不可以物悉取皆自然之理也皆在心内運天經以五藏六府各有所司皆法象同天地順陰陽自然應攝之道故曰運天經也晝夜存之自長生依此五神服色思存不捨不死之道仙經存五藏之氣變爲五色雲當頂上覆蔭一身日居於前月居於后左青龍右白虎前朱雀後玄武即去邪長生之道也肺部章第九肺部之宫似華蓋金宫也肺在五藏之上曰葉如蓋也下有童子坐玉闕童子名皓華肺形如蓋故以下言之玉闕者腎中白氣與上肺連之也七元之子主調氣元陽子曰七元之君負甲持符辟除凶邪而布氣七竅主耳目聰明七元七竅之外元氣也外應中嶽鼻齊位中嶽者鼻也又爲齊齊爲崑崙鼻爲七竅之門户位猶主也素錦衣裳黄雲帶素肺膜之色也黄膜蔓延羅緒有象雲氣也喘息呼吸體不快有時而然急存白元和六氣白元君主肺宫也大洞經云白元君居洞房之右是也神仙乆視無災害邪不干正用之不已形不滯常存此道形氣榮華至誠修鍊之所及也心部章第十心部之宫蓮含葉火宫也心藏之質象蓮花之未開也下有童子丹元家心神丹元也守靈神在心内而云下者據華蓋而云之也主適寒熱榮衛和寒熱陰陽靜燥之義也人常和適以榮衛其身老子經云靜盛寒燥勝熱清靜爲天下之正是也丹錦衣裳披玉羅心象離丹錦衣裳外陽也披玉羅内陰也金鈴朱帶坐婆婆金鈴内蘂之象也朱帶血脉之象也坐婆婆者言神安靜也九眞經云黄老君帶流金之鈴也調血理命身不枯心安體和則無病矣外應口舌吐五華心主口舌吐納五藏之津識五行之味故言外應五味也臨絶呼之亦登蘇人有病戹當存丹元童子朱衣赤冠以救護也久久行之飛太霞常修此道能獲飛仙肝部章第十一肝部之宫翠重裏木宫也肝色蒼翠大小相重之象也下有青童神公子肝東方木位主青故曰青童左位爲公子一名含明上有華蓋故曰下也主諸關鏡聰明始肝主春三月陽之本始竅主目五行之關鏡故曰聰明始也青錦披裳佩玉鈴青錦肝之色玉鈴白脉垂象也昇玄經云三天五帝皆帶大玉之珮素靈經云靈耀君衣青錦丹裳皆神仙之服也和制魂魄津液平内指事也東春和煦萬物生也外應眼目日月精肝外主眼左日右月也百痾所鍾存無英諸疾荐之但存無英公子同用七日自充盈五藏兼存故言同用凡七日爲一竟者一遊也垂絶念神死復生垂死存念肝神青衣童子還得活愈攝魂還魄永無傾太微靈書云每月三日十三日二十三日夕三魂棄身遊外攝之者常仰眠去枕伸足交手心上瞑目閉氣三息叩齒三通畢存心中有赤氣如雞子從内出於咽中赤氣轉大覆身變成火以燒身使匝覺體少熱呼三魂名曰爽靈胎光幽精即微呪曰太微宫中黄始青内鍊三魂胎光安寧神靈玉寳與我俱生不得妄動監者太虚若欲飛行唯詣上清若有飢渴得飲玄水玉精又每月朔望晦光魄盛總交通存思精鍊反還之法當此乃仰眠伸足掌心掩兩耳令指根繞於項上閉息七遍叩齒七通心存鼻端白氣如小豆大須臾漸大冠身上下九重氣忽變成兩青龍在兩目中白虎在兩鼻孔中朱雀在心上蒼龜在左足下螣蛇在右足下兩玉女著錦衣手把火光當兩耳門畢咽液七過呼七魄名屍狗伏矢雀陰天賊毒穢臭肺即呪曰素氣九還制魂邪奸天狩守門嬌女執關鍊魄和柔與我相安不得妄動看察形源若有飢渴聽飲月黄日丹腎部章第十二腎部之宫玄闕圓水宫也玄闕圓者兩腎之形狀也玄水色内象喻之也中有童子冥上玄腎爲下玄其神玄冥字育嬰心爲上玄幽遠氣與腎連故言冥上玄主諸六府九液源九液交連百脉流通廢一不可五藏六府乃九竅之津液也外應兩耳百液津腎宫主耳氣衰則聾陰陽和合則百脉津液流通也蒼錦雲衣龍舞蟠蒼錦腎色之象也雲衣腎膜之象也龍蟠腎脉之象也九眞經云道君常服青錦之衣蒼華之裙也上致明霞日月煙腎氣充之耳目聰明不衰外象喻也百病千災急當存元陽子曰寒暑相生男女相成腎中二神裳衣華清左男戴日右女戴月存想見之永無患故也兩部水王對生門腎藏雙對故曰兩部腎宫水王則化爲赤子故曰對生門使人長生昇九天赤子化爲眞人而昇九天九天常謂九氣青天其氣主生也脾部章第十三脾部之宫屬戊己土宫也戊己中央辰中有明童黄裳裏明童謂魂停黄裳土之色清穀散氣攝牙齒脾爲五藏之樞也脾磨食消生氣乃至齒爲羅千故攝牙齒是爲太倉兩明童太倉脾府此明童謂脾神名混康也坐在金臺城九重注念存思神狀常然方圓一寸命門中即黄庭之中丹田之所也主調百穀五味香口中滋味脾磨食之所致辟却虚羸無病傷内指事也外應尺宅氣色芳尺宅面也飢飽虚羸應形於面色也光華所生以表明是以知虚實也黄錦玉衣帶虎章脾主中黄謂黄庭眞人服錦衣也玉清隱書云太上道君佩神虎玉章也注念三老子輕翔三老者謂无老玄老君也念脾中眞人自然變化子謂受黄庭之學也長生高仙遠死殃莊子曰方生方死方死方生方可方不可方不可方可以此而談其理均也故長生者不死寂滅者不生不死不生則眞長生不生不死則眞寂滅何死殃之所及也膽部章第十四膽部之宫六府精六府已解於上太平經云積清成精故膽爲六府之精也中有童子耀威明經云膽神龍耀字威明勇悍之義也雷電八震揚玉旌八方雷震謂膽有威怒之象也玉旌則氣之貌龍旂横天擲火鈴膽色青龍旂威戰之具也火鈴者膽邊内珠之象也怒則奮揚故言擲也主諸氣力攝虎兵膽力主於悍難故攝虎兵外應眼瞳鼻柱間内指事也心之喜怒應於眉端也腦髮相扶亦俱鮮人之震怒髮必衝冠九色錦衣緑華裙青錦東方九氣之色緑華裙者膽膜之象佩金帶玉龍虎文膽神威明之服飾也能存威明乗慶雲内象喻也思存膽神不倦則仙道也役使萬靈朝三元三元道君名處三清上諸天神仙並朝宗也脾長章第十五脾長一尺掩太倉太倉胃也中黄經云胃爲太倉元陽子曰脾正横在胃之上也中部老君治明堂脾黄庭之宫也黄者老君之所治上應明堂明堂眉間入一寸是也厥字靈源名混康脾磨食消内外相應大腸爲胃之子混元陽受納之安康也治人百病消穀糧胃宫榮華則無病傷黄衣紫帶龍虎章脾居胃上故曰黄衣也紫帶龍章胃絡之象也長精益命賴君王太倉混康爲君爲王三呼我名神自通存思脾胃之神則心靈洞鑒之三老同坐各有朋上元老君居上黄庭宫與泥丸君倉華君青城君及明堂中君臣洞房中父母及天庭眞人等共爲朋也又中元老君居中黄庭宫與赤城童子丹田君皓華君含明英玄君丹元眞人等共爲朋也又下元老君居下黄庭宫與太乙君魂停君靈元君太倉君丹田眞人等共爲朋也常存三老和百神流通部位營衛無有差失也或精或胎别執方按玉曆經云下丹田者元命之根本精神之所藏五氣之元在臍下三寸附著脊號爲赤子府男子以藏精女子以藏胎主和合赤子陰陽之門户也其丹田中氣左青右黄上白下黑也桃核合延生華芒太乙君名字也處中使神氣盈美也男女迴九有桃康丹田下神名桃康主人之精胎能迴通三田成九神之氣道父道母對相望陰陽兩半成一故對相望師父師母丹玄鄉道與宗師陰陽之主也丹玄鄉爲存丹田之法可用存思登虚空學仙之道殊途一會歸要終合三以爲一散一以爲三此道之要也玄妙内篇云兆欲長生三一當明也閉塞三關握固停經云口爲天關生神機手爲人關把盛衰足爲地關生命扉又臍下三寸爲關元亦曰三關主固精護氣不妄施泄也含漱金醴吞玉英金醴玉英口中之津大洞經云服玄根之法心存胃口有一女子嬰兒形無衣服正立胃管張口承注魂液仰吸五氣當漱灌口内外津液滿口吞之遣入玄女口中五過畢叩齒五通咽液七過也遂至不飢三蟲亡洞神訣云上蟲白而青中蟲白而黄下蟲白而黑人死則三蟲出爲尸鬼各化爲物與形爲央撃之衝破也其餘諸蟲皆隨人而亡故學仙者清謹備五清之氣然後服藥物以去三蟲又云上尸名彭琚使人好滋味嗜慾癡滯中尸名彭質使人貪寳好喜怒下尸彭矯使人愛好衣服躭淫女色是以三名蟲也心意常和致忻昌道通無碍五嶽之雲氣彭亨五藏之氣爲五嶽之雲彭亨流通無壅之稱也保灌玉旁以自償玉旁鼻廬也三蟲既亡眞氣和合出入玄牝綿綿不絶故曰自償五形完堅無災殃五體與五藏之形也存練道成虚室生白五藏堅完自然災病不生神氣自應修眞十書黄庭内景玉經注卷之五十五
