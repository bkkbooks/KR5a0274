front:
  text: 修眞十書卷之五十七重二
  hash: sha256:4baccd646bc08c87ab209d44a9c1673f35824319d35c87682838658b10dc76d5
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5a0274_HFL_003-001a, image: hfl/0131/0131-112.png}
body:
  text: 黃庭内景玉經註梁丘子註高奔章第二十六高奔日月吾上道吾道君也上清紫文吞日月氣法一名赤丹金精石景水母玉胞經云其法常以日出東向叩齒九通心微祝日中日魂五帝名字呪曰日魂朱景照韜緑映回霞赤童玄炎飈象呼此十六字畢瞑目握固存五色流霞俱入口中又上清靈書有吞月精法月出西向叩齒十通心微祝月中五魂五夫人名字呪曰月魄藹蕭芬艷翳寥婉虚靈蘭鬱華結翹淳金精熒炅容臺標呪此二十四字畢握固瞑目存月中五色精光俱入口中又月光中黄氣大如目童名曰飛黄月華玉胞之精也能修此道則奔入日月神仙鬱儀結璘善相保鬱儀奔日之仙結璘奔月之仙同聲相應同氣相求故二仙來相保持也乃見玉清虚無老升三清之上與道合同也可以迴顏填血腦魂魄返嬰得成眞人口銜靈芝携五星口吐五色靈氣光芝四照與五黄老君周遊六合腰帶虎籙佩金璫仙人之服也九眞經云中央黄老君腰佩玄龍神虎符帶流金之鈴執紫麾之節籙符也駕欻接生宴東蒙欻倐言乗風忽發而往也東海仙境之山接生之方長與生氣相接連欻然而遊其處也玄元章第二十七玄元上一魂魄煉寳一以煉神神煉以合一一之爲物頗卒見一者無稱也心恬淡以得之而不可見須得至眞乃顧盻守眞志滿一自歸己至忌死氣諸穢賤凡飛丹煉藥服氣吞霞等事皆忌見伏屍殗穢之氣此謂生處之共患也然則道沖虚本無淨穢家獲眞正則淨穢有殊殊而不齊則是非起於内生死見於外故清淨者生之徒濁穢者死之徒故養生之所忌六神合集虚中宴六甲六丁六府等諸神皆在身中虚空則宴然安結珠固精養神根結珠謂咽液先後相交如珠固精不妄泄神根形軀也夫神之於身猶國之有君君之有人人以君爲命君以人爲本互相資藉以爲生之而調養之也玉𥫽金籥常完全老子云善閉無關鍵而不可開籥鎖也𥫽或爲匙閉口屈舌食胎津屈舌通津液食津而胎仙故曰胎津使我遂煉獲飛仙精功勤誠之所致也仙人章第二十八仙人道士非有神修學以積精治氣以爲眞積精累氣以爲眞固精守氣積煉成眞修學以得之黄童妙音難可聞黄童謂黄庭眞人也一名赤城童子妙音謂黄庭道之妙音也玉書絳簡赤丹文黄庭經一名太帝金書一名東華玉篇字曰眞人巾金巾眞人則黄童也金色白在西方主肺色白在心故曰巾九眞經云東方青帝有之衣青玉錦衣帔蒼華裙建符芝丹冠巾金巾元陽子曰眞人馮午倨子履卯戴酉酉者金也負甲持符開七門老子六甲三部符云甲子神名王文卿甲戌神名展子江甲申神名扈文長甲午神名衛上卿甲辰神名孟非卿甲寅神名明文章存六神之名者則七竅開通故無有疾病火兵符圖備靈關赤童斬邪籙皆使役三五火兵又衛靈神呪曰南方丹天三氣流光熒星轉燭洞照太陽上有赤精開明靈童總禦火兵備事三宫即火兵三五家事也符者八素六神陰陽玉胎煉仙陰精飛景黄華石景内化洞神藍乾等諸符也圖者六甲玉女通靈圖太一眞人圖東井沐浴圖老子内視圖西昇八史圖九變含景赤界等諸圖可以備守虚關關即三關四關等人身中俱有之前昂後卑高下陳列位之形象也執劍百丈舞錦旛神兵旛劍之形狀也十絶槃空扇紛紜空中作氣暐曄揮霍也火鈴冠霄墜落煙金精火鈴冠徹霄漢部伍隊陣狀如落煙屯雲之勢安在黄闕兩眉間存思火兵氣狀俱在天庭天庭一名黄闕在兩眉間是也此非枝葉實是根學仙之本紫清章第二十九紫清上皇大道君亦名玉宸宫太玄太和俠侍端太玄太和眞仙之臺號也化生萬物使我仙道氣之功致也飛昇十天駕玉輪乗欻而往晝夜七日思勿眠至誠至感子能修之可長存延年神仙之道積功成鍊非自然學以致其道也是由精誠亦守一守一如初成道有餘内守堅固眞之眞從等却也虚中恬淡自致神神以虚受故也百穀章第三十百穀之實土地精土實曰穀陰之類也五味外美邪魔腥非清虚之眞氣臭亂神明胎氣零胎氣謂無味之味自然之正氣也服氣有胎息之正法度零猶失也那從返老得還嬰髮白返黑齒落更生此一句應在自致神之下起此之不類也三魂忽忽魄縻傾忽忽不恬淡縻傾朽敗也何不食氣太和精進服煉之道故能不死入黄寧黄寧黄庭之道成也心典章第三十一心典一體五藏王神以虚受心爲棲神之宅故爲之王動靜念之道德行念謂念丹元童子也夫念爲有志爲亡念則易心而後語亡則灰心而全神故道德行也清潔善氣自明光常念之故坐起吾俱共棟梁神以身爲屋宅故云共棟梁吾丹元童子也晝日耀景暮閉藏莊子曰其覺也魂開其寐也魂交之閉也通利華精調陰陽謂心神用捨與目相應華精目精也心開則目開晝陽而暮陰故云調陰陽也經歷章第三十經歷六合隱卯酉舉心之用捨陰陽之所由也晝爲經歷夜爲隱藏六合天地上下四方卯酉以北爲暮幽隱屬之也兩腎之神主延壽腎神玄㝠育嬰所屬北方主暮夜人能精心則主長壽河上公曰腎藏精也轉降適斗藏初九九陽數也斗北辰也主降陽謂陽氣下與陰合易曰乾吉在元首藏之也知雄守雌可無老守雌則藏九之文也知白見黑見坐守老子經曰知其白守其黑知其雄守其雌此藏九文也肝氣章第三十三肝氣鬱勃清且長肝位東方木主春生氣之本也清長氣色象也羅列六府生三光存想生氣遍照五藏六府如日月星辰光曜明初也心精意專内不傾能知一也雨潤萬物玉漿乃潤百體也玄液雲行去臭香眞氣周流則無災病治蕩齒髮煉五方雲行雨施無所不通故曰五方五藏也取津玄膺入明堂咽液之道必自玄膺下入喉嚨喉嚨一名重樓重樓之下爲明堂明堂之下爲洞房洞房之下爲丹田此中部也下既喉嚨神明通身命以津氣爲主者坐侍華蓋遊貴京華蓋肺也肝在肺之下貴京丹田也飄颻三清席清凉三帝三丹田之道君也亦名眞人言肝氣者氣飄颻周流三丹田之所也肝氣爲目精故席清凉也五色雲氣紛青葱肝氣與五藏相雜者爲雲閉目内盻自相望常存念之五藏自見使諸心神還自崇赤城童子爲心藏眞人合契同府共相尊敬七玄英華開命門七竅流通無留滯也通利天道存玄根身爲根本百二十年猶可還當急修行時不可失也過此守道誠甚難去死近也唯待九轉八瓊丹九轉神丹白日昇天抱朴子九丹論云老覽養生之書鳴集乆視之方曾以授涉篇千計矣莫不以還丹金液爲大要焉又黄帝九鼎神丹經云帝服之而昇仙與天地同畢乗雲駕龍出入太清八瓊丹砂雄黄空青硫黄雲母戎鹽隱石雌黄是也要復精思存七元雖服神丹兼爲黄庭之道七元者謂七星及七竅之眞神又五帝元君及白元無英君變爲七元道君洞房訣云存七元者其呪曰回元隱道豁落七辰七辰七元也日月之華救老殘左目主日右目主月目主肝死東方木行也木位春春爲生氣故云救老殘肝氣周流終無端莊子曰脂窮爲薪而火傳生得納養而命藏焉肺之章第三十四肺之爲氣三焦起中黄經云肺首爲三焦肺之爲氣謂氣漱氣起自三焦說三焦者多未明其實倒以爲三藏之上系管爲三焦焦者熱也言心肝肺頭熱之義矣視聽幽㝠候童子童子心神赤城中者元陽子曰闚離天下存童子童子目童也謂人欲知死生以手指拄眥有光則生無光則死也候其目光調理五華精髮齒五華五藏之氣仙經曰髮欲數櫛齒欲數叩三十六嚥玉池裏口爲玉池亦曰華池咽液入丹田所謂灌溉靈根也開通百脉血液始身中血液以口爲本始也顏色生光金玉澤百脉開通齒堅髮黑不知白返老還嬰存此眞神勿落落專神不惰當憶紫宫有坐席紫宫謂肺宫也坐席神之所安中黄經云肺首爲三焦玄龍君之所居衆神合會轉相索衆神相聚豈有邪精隱藏章第三十五隱藏羽蓋看天舍此明脾宫之事脾宫爲丹田黄庭中央戊己土行也仰觀肝肺如蓋之舍者也是故脾之所也朝拜太易樂相呼衆神次於脾宫神敬太上神仙喜樂相召也謂魂與衆仙合會也靈素經云太上神仙有太易君太虚君皓素君群仙宗道遊樂之也明神八威正辟邪八靈神有明德正法而去邪保守牌宫也八威八靈神也眞誥曰北帝殺鬼呪曰七政八靈太上皓兇長顱巨獸手把帝鍾素梟三乗嚴駕夔龍此守衛之法滅邪去兇者也宜誦之脾神還歸是胃家脾爲胃用故神歸之脾神名常在字魂停脾磨食消胃家之事也中黄經曰胃爲太倉太倉脾藏也耽養靈根不復枯修黄庭神愛養性命不復枯朽脾爲黄庭人命之根本也專心養之延年神仙也閉塞命門保玉都身爲玉都閉丹田命門保精也元陽子曰命門者下丹田精氣出入神之處也身爲玉都神聚其所由都邑也萬神方𥅁壽有餘衆靈降福能延翫也𥅁報也萬神以養見報故壽有餘也是爲脾建在中宫脾主中宫土德位也五藏六府神明王黄中以脾爲主者也上合天門入明堂存五藏六府之氣上合天門天門在兩眉間即天庭也眉間入一寸爲明堂也守雌存雄頂三光老子經云知其雄守其雌雌牝柔弱也三光謂日月星也外方内圓神在中外方内圓明堂之象脾神與眞一居中也通理血脉五藏豐神恬心清骨青筋赤髓如霜百骸九竅悉皆眞正脾救七竅去不祥脾通胃氣以應外竅禦邪辟惡脾磨食消耳聰目明日月列布設陰陽氣分布兩眉左陽右陰日陽主男月陰主女也兩神相會化玉漿陰陽和會生精化其男女陰陽自然之津液也淡然無味天人糧神能合會當味無味子丹進饌殽正黄童子用黄氣爲食而養之饌氣也子丹眞人也丹田之眞氣脾爲中黄脾磨食也乃曰琅膏及玉霜津液精氣之色象也太上隱環八素瓊喉嚨曰重樓名太上隱環中有八瓊素液也涵八素瓊液絳宫重樓十二環也中有八素致津溉益八液腎受精能滋八液入腎爲玉精咽液流下入腎宫化於玉精伏於太陰見我形腎爲太陰陽伏其間是胎之形也太陰洞房謂觀瓊液之形象揚風三玄出始青腎屬三冬色玄陰極則生春發陽出青氣揚風感化也陰陽二氣與腎氣爲三三生萬物微妙故曰三玄出始青言萬物生色青太平經云積清成青也恍惚之間至清靈三玄性生其氣微妙不可以形質求之乃於恍惚之間得至清虚之境陰陽之氣至微妙戲於飈臺見赤生遊於飈臺之上見赤子眞人也謂和暢之氣化爲赤子赤子眞人飈臺神仙之遊集所也逸域熙眞養華榮傲戲飈臺是爲逸域仰眞聖怡英華物外眞氣是自然養生也内盻沈默鍊五形希睹眞聖還視内觀修煉形體神氣長存三氣徘徊得神明内盻煉形三田氣行得與神靈相通三丹田之氣也隱龍遁芝雲琅英肝膽爲隱龍竅脉爲内芝脾氣化衆液並爲玉英也仙經曰肝膽爲青龍故曰遁芝雲琅英者脾氣之津液也可以充飢使萬靈芝英能使不飢驅使衆靈服氣道成役使鬼神上蓋玄玄下虎章服煉道成天降神虎玉章也神仙之服御也元録經云仙人有玄羽之蓋神虎之章沐浴章第三十六沐浴盛潔棄肥薰此已後入靜持經之法也盛字古之淨字肥魚肉五辛也入室東向誦玉篇向大帝也大帝在東約得萬遍義自鮮遍數既足功多則義自明不出身中散髮無欲以長存瀟然無欲而得長年仙經曰服九霞必先散髮又胎息法云仰卧散髮或云先外情欲散髮令枕高一寸二分屈兩手大拇指握固閉目閉目伸兩臂去身五寸漱滿口中津液咽之滿口徐徐微以鼻内氣引入五六息則吐一呼一吸爲一息至十吐氣可頻伸伸訖復爲之滿四十九爲一竟矣尋觀文意此散髮非專此道也蓋散髮無爲自得之意五味皆至正氣還神凝液流正氣入藏成五味而俱至也合五爲一自然之道夷心寂悶勿煩寃不見有心自然無悶悶靜也寂然清靜老子曰其政悶悶其民淳淳過數已畢體神精過數已畢身入虚妙專誠所致黄華玉女告子情丹田之神示其經意丹田陰神與其言也眞人既至使六丁黄庭神至役使六丁眞人指學道者神至謂精至也六丁前文已解說也十讀四拜朝太上拜太上老君也玉清眞訣云誦東華玉篇者必十讀四拜玉篇乃此文也先謁太帝後北向太帝在東七元居北黄庭内經玉書暢如上修習朝拜則使黄庭道成玉經理通授者曰師受者盟此言持經功著可以爲師授人也斯文堪重也雲錦鳳羅金纏斯物爲盟誓之信也以代割髮肌膚全古者爲盟誓不妄傳當割髮歃血今代以雲錦使全肌膚也攜手登山歃液丹如傳丹經歃血立誓學神丹金液者必先重盟而後傳授金書玉景乃可宣立盟乃可宣傳神仙法也信向之者授之傳得審受若三官三官者天地水勿令七祖受冥患授非其人七祖受殃太上微妙致神仙可尊可貴不死之道此其文此經長生之道一心敬受奉行修眞十書黄庭内景玉經注卷之五十七
